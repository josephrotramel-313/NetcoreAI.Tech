# ─────────────────────────────────────────────────────────────────────────────
# Deploy NetcoreAI.Tech to Hostinger VPS on push to main
#
# Flow:
#   1. Print the runner's public IP (helpful if Hostinger's firewall ever
#      blocks SSH — you'll see exactly which IP needs to reach your VPS).
#   2. Fail fast if any required secret is empty.
#   3. SSH into the VPS as a non-root user in the docker group.
#   4. On the VPS: cd /docker/netcoreai, git fetch + reset --hard to origin/main
#      (guarantees a clean tree), docker compose up -d --build, prune images.
#   5. Back on the runner: curl https://netcoreai.tech and fail if no 2xx/3xx.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   • VPS_HOST        — your Hostinger VPS IP or hostname (e.g. 123.45.67.89)
#   • VPS_USER        — the non-root deploy user (e.g. deploy)
#   • VPS_SSH_KEY     — UNENCRYPTED private SSH key (PEM/OpenSSH, no passphrase).
#                       Generate with: ssh-keygen -t ed25519 -f deploy_key -N ""
#                       Add deploy_key.pub to ~/.ssh/authorized_keys on the VPS,
#                       then store the contents of deploy_key as this secret.
#                       IMPORTANT: the value must include the BEGIN/END header
#                       lines AND end with a trailing newline, or drone-ssh
#                       errors with "ssh: no key found".
#   • VPS_PORT        — optional, defaults to 22 if unset.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false  # don't interrupt an in-flight deploy

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Show runner public IP
        run: |
          ip=$(curl -fsS --max-time 5 https://api.ipify.org || echo "unknown")
          echo "Runner public IP: $ip"
          echo "::notice title=Runner IP::$ip"

      - name: Verify required secrets are present
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ];    then echo "::error::VPS_HOST secret is empty";    missing=1; fi
          if [ -z "$VPS_USER" ];    then echo "::error::VPS_USER secret is empty";    missing=1; fi
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::VPS_SSH_KEY secret is empty"; missing=1; fi
          if [ "$missing" = "1" ]; then exit 1; fi

          # Sanity-check that the key at least looks like an OpenSSH private key.
          # (We don't print the key itself — only a structural check.)
          if ! printf '%s' "$VPS_SSH_KEY" | head -n1 | grep -q "BEGIN .*PRIVATE KEY"; then
            echo "::error::VPS_SSH_KEY does not start with '-----BEGIN ... PRIVATE KEY-----'. Check the pasted value."
            exit 1
          fi
          echo "All required secrets are present and the SSH key has the expected header."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script_stop: true  # abort on first failing command
          script: |
            set -euo pipefail

            PROJECT_DIR="/docker/netcoreai"
            REPO_URL="https://github.com/josephrotramel-313/NetcoreAI.Tech.git"

            echo "==> Deploying to $PROJECT_DIR"

            # Auto-clone on first deploy if the directory isn't a git repo yet.
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "==> $PROJECT_DIR is not a git repo — cloning for the first time..."
              mkdir -p "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
              echo "==> Clone complete"
            fi

            cd "$PROJECT_DIR"

            echo "==> Commit before update: $(git rev-parse --short HEAD)"

            echo "==> Fetching latest main"
            git fetch --prune origin main
            git reset --hard origin/main

            echo "==> Commit after update:  $(git rev-parse --short HEAD)"

            echo "==> Pulling any upstream base images (locally-built images will be skipped)"
            docker compose pull || true

            echo "==> Rebuilding and restarting containers"
            docker compose up -d --build --remove-orphans

            echo "==> Container status:"
            docker compose ps

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Deploy complete"

      - name: Smoke test https://netcoreai.tech
        run: |
          set -euo pipefail

          echo "Waiting 15s for Traefik to route to the new containers..."
          sleep 15

          max_attempts=10
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Attempt $attempt/$max_attempts: curling https://netcoreai.tech"
            status=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 20 https://netcoreai.tech || echo "000")
            echo "  -> HTTP $status"
            if [[ "$status" =~ ^[23][0-9][0-9]$ ]]; then
              echo "Site is up."
              exit 0
            fi
            sleep 10
          done

          echo "Site did not return a 2xx/3xx after $max_attempts attempts."
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "### Deploy summary"
            echo ""
            echo "- **Project dir:** \`/docker/netcoreai\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Triggered by:** ${{ github.actor }}"
            echo "- **Result:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
