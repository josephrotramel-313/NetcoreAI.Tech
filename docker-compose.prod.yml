services:
  server:
    image: josephthe313/netcoreai-server:latest
    container_name: netcoreai_server
    restart: unless-stopped
    environment:
      PORT: "5001"
      ALLOWED_ORIGINS: "*"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: josephthe313/netcoreai-web:latest
    container_name: netcoreai_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      EXPRESS_INTERNAL_URL: "http://server:5001"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: josephthe313/netcoreai-nginx:latest
    container_name: netcoreai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
